name: Import Tosca Results to Xray

on:
  workflow_dispatch:
    inputs:
      results_file:
        description: 'Path to ToscaCIResults.xml'
        required: true
        default: 'results/ToscaCIResults.xml'
      test_exec_summary:
        description: 'Test Execution summary in Jira'
        required: false
        default: 'WAVE_6 - Opella Italy O2C Regression'
      test_environment:
        description: 'Test environment label'
        required: false
        default: 'SAP_FIORI_ITALY'

jobs:
  import-to-xray:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate with Xray Cloud
        id: auth
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://xray.cloud.getxray.app/api/v2/authenticate" \
            -H "Content-Type: application/json" \
            -d "{\"client_id\":\"${{ secrets.XRAY_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.XRAY_CLIENT_SECRET }}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          TOKEN=$(echo "$RESPONSE" | head -n1 | tr -d '"')

          echo "Auth HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Authentication failed: $RESPONSE"
            exit 1
          fi

          echo "Authentication successful"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Fix XML - add classname attribute
        run: |
          python3 scripts/fix_junit_xml.py \
            "${{ github.event.inputs.results_file }}" \
            results/ToscaCIResults_fixed.xml

          echo "File size: $(wc -c < results/ToscaCIResults_fixed.xml) bytes"
          echo "=== FULL CONTENT OF FIXED XML ==="
          cat results/ToscaCIResults_fixed.xml
          echo "=== END OF FIXED XML ==="

      - name: Import JUnit XML to Xray Cloud
        run: |
          SUMMARY="${{ github.event.inputs.test_exec_summary }}"
          ENVIRONMENT="${{ github.event.inputs.test_environment }}"
          PROJECT="${{ secrets.JIRA_PROJECT_KEY }}"

          echo "Importing file: results/ToscaCIResults_fixed.xml"
          echo "Project: $PROJECT"
          echo "Summary: $SUMMARY"
          echo "Environment: $ENVIRONMENT"

          INFO_JSON=$(printf '{"fields":{"project":{"key":"%s"},"summary":"%s","issuetype":{"name":"Test Execution"}},"xrayFields":{"testEnvironments":["%s"],"revision":"WAVE_6"}}' \
            "$PROJECT" "$SUMMARY" "$ENVIRONMENT")

          echo "Info JSON: $INFO_JSON"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://xray.cloud.getxray.app/api/v2/import/execution/junit/multipart" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -F "file=@results/ToscaCIResults_fixed.xml;type=text/xml" \
            -F "info=$INFO_JSON;type=application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Xray HTTP status: $HTTP_CODE"
          echo "Xray response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Import failed"
            exit 1
          fi

          echo "Import successful"
