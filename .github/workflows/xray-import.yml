name: Import Tosca Results to Xray

on:
  workflow_dispatch:
    inputs:
      results_file:
        description: 'Path to ToscaCIResults.xml'
        required: true
        default: 'results/minimal_test.xml'
      project_key:
        description: 'Jira project key (e.g. CHCCRM01). Leave empty to use the JIRA_PROJECT_KEY secret.'
        required: false
        default: 'CHCCRM01'
      test_exec_summary:
        description: 'Test Execution summary in Jira'
        required: false
        default: 'Automation Test Execution'
      test_environment:
        description: 'Test environment label (must exist in Xray project, leave empty to skip)'
        required: false
        default: ''

jobs:
  import-to-xray:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate with Xray Cloud
        id: auth
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://xray.cloud.getxray.app/api/v2/authenticate" \
            -H "Content-Type: application/json" \
            -d "{\"client_id\":\"${{ secrets.XRAY_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.XRAY_CLIENT_SECRET }}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          TOKEN=$(echo "$RESPONSE" | head -n1 | tr -d '"')

          echo "Auth HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Authentication failed: $RESPONSE"
            exit 1
          fi

          echo "Authentication successful"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Fix XML - add classname attribute
        run: |
          python3 scripts/fix_junit_xml.py \
            "${{ github.event.inputs.results_file }}" \
            results/ToscaCIResults_fixed.xml

          echo "File size: $(wc -c < results/ToscaCIResults_fixed.xml) bytes"
          echo "=== FULL CONTENT OF FIXED XML ==="
          cat results/ToscaCIResults_fixed.xml
          echo "=== END OF FIXED XML ==="

      # WORKAROUND: Reset Test Run status to TODO before importing.
      # Xray blocks creating new Test Runs if the test's last run is PASSED/FAILED.
      # This step fetches the active Test Run for each test and resets it to TODO.
      # TODO: Remove this step once the Xray Test Workflow in Opella is configured
      # to allow re-execution (transition PASSED/FAILED -> EXECUTING).
      # Hardcoded issueIds: 1200140 = Automated Test01 (CHCCRM01)
      - name: Reset Test Run status to TODO (workaround)
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          ISSUE_IDS=("1200140")

          for ISSUE_ID in "${ISSUE_IDS[@]}"; do
            echo "Fetching Test Run for issueId: $ISSUE_ID"

            RUN_RESPONSE=$(curl -s -X POST \
              "https://xray.cloud.getxray.app/api/v2/graphql" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"{ getTestRuns(testIssueIds: [\\\"$ISSUE_ID\\\"], limit: 1) { results { id status { name } } } }\"}")

            echo "Test Run response: $RUN_RESPONSE"

            RUN_ID=$(echo "$RUN_RESPONSE" | python3 -c "import sys,json; runs=json.load(sys.stdin)['data']['getTestRuns']['results']; print(runs[0]['id'] if runs else '')")

            if [ -z "$RUN_ID" ]; then
              echo "No existing Test Run found for $ISSUE_ID, skipping reset"
              continue
            fi

            echo "Resetting Test Run $RUN_ID to TODO"

            RESET_RESPONSE=$(curl -s -X POST \
              "https://xray.cloud.getxray.app/api/v2/graphql" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"mutation { updateTestRunStatus(id: \\\"$RUN_ID\\\", status: \\\"TODO\\\") }\"}")

            echo "Reset response: $RESET_RESPONSE"
          done

      - name: Import JUnit XML to Xray Cloud
        run: |
          SUMMARY="${{ github.event.inputs.test_exec_summary }}"
          ENVIRONMENT="${{ github.event.inputs.test_environment }}"
          INPUT_PROJECT="${{ github.event.inputs.project_key }}"
          PROJECT="${INPUT_PROJECT:-${{ secrets.JIRA_PROJECT_KEY }}}"

          echo "Importing file: results/ToscaCIResults_fixed.xml"
          echo "Project: $PROJECT"
          echo "Summary: $SUMMARY"
          echo "Environment: $ENVIRONMENT"

          ENCODED_SUMMARY=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$SUMMARY")

          URL="https://xray.cloud.getxray.app/api/v2/import/execution/junit?projectKey=${PROJECT}&testExecSummary=${ENCODED_SUMMARY}"
          if [ -n "$ENVIRONMENT" ]; then
            ENCODED_ENV=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$ENVIRONMENT")
            URL="${URL}&testEnvironments=${ENCODED_ENV}"
          fi

          echo "URL: $URL"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "$URL" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "Content-Type: text/xml" \
            --data-binary "@results/ToscaCIResults_fixed.xml")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Xray HTTP status: $HTTP_CODE"
          echo "Xray response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Import failed"
            exit 1
          fi

          echo "Import successful"
