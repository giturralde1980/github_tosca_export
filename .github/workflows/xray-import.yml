name: Import Tosca Results to Xray

on:
  workflow_dispatch:
    inputs:
      results_file:
        description: 'Path to ToscaCIResults.xml'
        required: true
        default: 'results/ToscaCIResults.xml'
      test_exec_summary:
        description: 'Test Execution summary in Jira'
        required: false
        default: 'WAVE_6 - Opella Italy O2C Regression'
      test_environment:
        description: 'Test environment label'
        required: false
        default: 'SAP_FIORI_ITALY'

jobs:
  import-to-xray:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate with Xray Cloud
        id: auth
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://xray.cloud.getxray.app/api/v2/authenticate" \
            -H "Content-Type: application/json" \
            -d "{\"client_id\":\"${{ secrets.XRAY_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.XRAY_CLIENT_SECRET }}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          TOKEN=$(echo "$RESPONSE" | head -n1 | tr -d '"')

          echo "Auth HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Authentication failed: $RESPONSE"
            exit 1
          fi

          echo "Authentication successful"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Fix XML - add classname attribute
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET

          tree = ET.parse('${{ github.event.inputs.results_file }}')
          root = tree.getroot()

          for testsuite in root.findall('testsuite'):
              suite_name = testsuite.get('name', 'UNKNOWN')
              for testcase in testsuite.findall('testcase'):
                  if not testcase.get('classname'):
                      testcase.set('classname', suite_name)

          tree.write('results/ToscaCIResults_fixed.xml', encoding='utf-8', xml_declaration=True)
          print("XML fixed - classname attributes added")
          EOF

      - name: Import JUnit XML to Xray Cloud
        run: |
          SUMMARY="${{ github.event.inputs.test_exec_summary }}"
          ENCODED_SUMMARY=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$SUMMARY'))")

          echo "Importing file: ${{ github.event.inputs.results_file }}"
          echo "Project: ${{ secrets.JIRA_PROJECT_KEY }}"
          echo "Summary: $SUMMARY"
          echo "Environment: ${{ github.event.inputs.test_environment }}"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://xray.cloud.getxray.app/api/v2/import/execution/junit?projectKey=${{ secrets.JIRA_PROJECT_KEY }}&testExecSummary=${ENCODED_SUMMARY}&testEnvironments=${{ github.event.inputs.test_environment }}&revision=WAVE_6" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "Content-Type: multipart/form-data" \
            -F "file=@results/ToscaCIResults_fixed.xml")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Xray HTTP status: $HTTP_CODE"
          echo "Xray response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Import failed"
            exit 1
          fi

          echo "Import successful"
